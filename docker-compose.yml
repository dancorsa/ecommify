services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommify
      POSTGRES_USER: ecommify
      POSTGRES_PASSWORD: ecommify2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgresql/schema/00_base_schema.sql:/docker-entrypoint-initdb.d/00-base-schema.sql
      - ./database/postgresql/schema/01_extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
      - ./database/postgresql/schema/02_advanced_types.sql:/docker-entrypoint-initdb.d/02-advanced-types.sql
      - ./database/postgresql/schema/03_partitioning.sql:/docker-entrypoint-initdb.d/03-partitioning.sql
      - ./database/postgresql/schema/04_materialized_views.sql:/docker-entrypoint-initdb.d/04-materialized-views.sql
      - ./database/postgresql/schema/05_triggers.sql:/docker-entrypoint-initdb.d/05-triggers.sql
      - ./database/postgresql/schema/06_maintenance_jobs.sql:/docker-entrypoint-initdb.d/06-maintenance-jobs.sql
      - ./database/postgresql/seed_data/01_seed.sql:/docker-entrypoint-initdb.d/07-seed.sql
    ports:
      - "5432:5432"
    networks:
      - ecommify-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommify -d ecommify"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: ecommify-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ecommify
    volumes:
      - mongo_data:/data/db
      - ./database/mongodb/schema/seed.js:/docker-entrypoint-initdb.d/seed.js
    ports:
      - "27017:27017"
    networks:
      - ecommify-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Backend (Node.js + Express) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommify-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      POSTGRES_URL: postgresql://ecommify:ecommify2024@postgres:5432/ecommify
      POSTGRES_SSL: "false"
      MONGODB_URI: mongodb://mongo:27017/ecommify
      JWT_SECRET: ecommify_jwt_secret_docker_2024
      JWT_EXPIRES_IN: 24h
    ports:
      - "3000:3000"
    networks:
      - ecommify-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommify-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - ecommify-net

volumes:
  postgres_data:
  mongo_data:

networks:
  ecommify-net:
    driver: bridge
