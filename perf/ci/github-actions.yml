name: Performance Tests – Ecommify API

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Escenario a ejecutar (all / 01 / 02 / 03 / 04 / 05 / 06)'
        required: false
        default: 'all'
  push:
    branches: [main, master]
    paths:
      - 'perf/scripts/**'
      - 'perf/data/**'

env:
  JMETER_VERSION: "5.6.3"
  BASE_URL: "localhost"
  PORT: "3000"

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ecommify
          POSTGRES_PASSWORD: ecommify_pass
          POSTGRES_DB: ecommify_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java (JMeter requiere JRE 11+)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Descargar Apache JMeter
        run: |
          wget -q "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz"
          tar -xzf "apache-jmeter-${JMETER_VERSION}.tgz"
          echo "$(pwd)/apache-jmeter-${JMETER_VERSION}/bin" >> $GITHUB_PATH

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias de la aplicación
        run: npm ci

      - name: Inicializar base de datos
        run: |
          npm run db:migrate || echo "Migraciones opcionales"
          npm run db:seed || echo "Seeds opcionales"
        env:
          DATABASE_URL: postgresql://ecommify:ecommify_pass@localhost:5432/ecommify_db
          MONGODB_URI: mongodb://localhost:27017/ecommify

      - name: Iniciar aplicación en segundo plano
        run: |
          npm start &
          echo "APP_PID=$!" >> $GITHUB_ENV
          sleep 10
        env:
          DATABASE_URL: postgresql://ecommify:ecommify_pass@localhost:5432/ecommify_db
          MONGODB_URI: mongodb://localhost:27017/ecommify
          PORT: 3000
          NODE_ENV: test

      - name: Verificar API disponible
        run: |
          for i in $(seq 1 12); do
            curl -sf http://localhost:3000/api/catalog/prod-001 && break
            echo "Intento $i – esperando API..."
            sleep 5
          done

      - name: Crear directorio de resultados
        run: mkdir -p perf/results/screenshots

      # ------------------------------------------------------------------ 01
      - name: "01 – Baseline Test (10 VUs, 5 min)"
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == '01' || github.event.inputs.scenario == '' }}
        run: |
          jmeter -n \
            -t perf/scripts/01_baseline_test.jmx \
            -l perf/results/01_baseline.jtl \
            -e -o perf/results/01_baseline_report \
            -JBASE_URL=$BASE_URL -JPORT=$PORT
        continue-on-error: true

      # ------------------------------------------------------------------ 02
      - name: "02 – Load Test (50→100 VUs)"
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == '02' || github.event.inputs.scenario == '' }}
        run: |
          jmeter -n \
            -t perf/scripts/02_load_test.jmx \
            -l perf/results/02_load.jtl \
            -e -o perf/results/02_load_report \
            -JBASE_URL=$BASE_URL -JPORT=$PORT
        continue-on-error: true

      # ------------------------------------------------------------------ 03
      - name: "03 – Stress Test (200→400→600 VUs)"
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == '03' || github.event.inputs.scenario == '' }}
        run: |
          jmeter -n \
            -t perf/scripts/03_stress_test.jmx \
            -l perf/results/03_stress.jtl \
            -e -o perf/results/03_stress_report \
            -JBASE_URL=$BASE_URL -JPORT=$PORT
        continue-on-error: true

      # ------------------------------------------------------------------ 04
      - name: "04 – Spike Test (10→300→10 VUs)"
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == '04' || github.event.inputs.scenario == '' }}
        run: |
          jmeter -n \
            -t perf/scripts/04_spike_test.jmx \
            -l perf/results/04_spike.jtl \
            -e -o perf/results/04_spike_report \
            -JBASE_URL=$BASE_URL -JPORT=$PORT
        continue-on-error: true

      # ------------------------------------------------------------------ 05 (solo manual)
      - name: "05 – Soak Test (100 VUs, 60 min) – Solo ejecución manual"
        if: ${{ github.event.inputs.scenario == '05' }}
        run: |
          jmeter -n \
            -t perf/scripts/05_soak_test.jmx \
            -l perf/results/05_soak.jtl \
            -e -o perf/results/05_soak_report \
            -JBASE_URL=$BASE_URL -JPORT=$PORT
        timeout-minutes: 75
        continue-on-error: true

      # ------------------------------------------------------------------ 06
      - name: "06 – Regression Test (10 VUs, 5 min)"
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == '06' || github.event.inputs.scenario == '' }}
        run: |
          jmeter -n \
            -t perf/scripts/06_regression_test.jmx \
            -l perf/results/06_regression.jtl \
            -e -o perf/results/06_regression_report \
            -JBASE_URL=$BASE_URL -JPORT=$PORT
        continue-on-error: true

      - name: Subir resultados JTL
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results-jtl
          path: perf/results/*.jtl
          retention-days: 30

      - name: Subir reportes HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-reports-html
          path: perf/results/*_report/
          retention-days: 30

      - name: Detener aplicación
        if: always()
        run: |
          kill $APP_PID || true
